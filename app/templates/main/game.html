{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-4">Pen12: Hedefini Seç!</h2>
            <div class="d-flex justify-content-between align-items-center mb-4 px-3 py-2 bg-light rounded shadow-sm">
                <h4 class="m-0">Skor: <span id="current-score" class="badge bg-primary fs-4">{{ game.total_score }}</span></h4>
                <p class="m-0 text-muted">Bugünkü Oyun</p>
            </div>
            
            <div id="notification-area" class="alert d-none" role="alert"></div>

            <div class="goal-container bg-success p-3 rounded-3 shadow" style="border: 5px solid white;">
                <div class="goal-grid d-grid gap-2" style="grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 100px);">
                    {% for zone in range(1, 13) %}
                        <button type="button" class="btn btn-outline-light w-100 h-100 fs-3 fw-bold shoot-btn" data-zone="{{ zone }}">
                            {{ zone }}
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const shootBtns = document.querySelectorAll('.shoot-btn');
    const scoreElement = document.getElementById('current-score');
    const notificationArea = document.getElementById('notification-area');
    
    // CSRF Token if using flask-wtf, but we haven't added one here, it's a simple fetch.
    // If Flask-WTF is globally enabled and CSRFProtect is initialized, we might need a meta tag.
    // Assuming standard JSON post for now.

    shootBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const zone = this.getAttribute('data-zone');
            
            // Butonları geçici olarak devre dışı bırak (spam engellemek için)
            shootBtns.forEach(b => b.disabled = true);
            this.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';

            fetch("{{ url_for('main.shoot') }}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ zone: zone })
            })
            .then(response => response.json())
            .then(data => {
                shootBtns.forEach(b => b.disabled = false);
                this.innerHTML = zone; // Buton yazısını geri getir

                if (data.success) {
                    // Skoru güncelle
                    scoreElement.innerText = data.new_score;
                    
                    // Bildirim göster
                    notificationArea.classList.remove('d-none', 'alert-success', 'alert-danger');
                    if (data.is_goal) {
                        notificationArea.classList.add('alert-success');
                        notificationArea.innerText = `GOOOLLL! Bölge ${data.zone} tam isabet!`;
                        this.classList.remove('btn-outline-light');
                        this.classList.add('btn-success');
                    } else {
                        notificationArea.classList.add('alert-danger');
                        notificationArea.innerText = `KAÇTI! Kaleci veya direk. Bölge ${data.zone}.`;
                        this.classList.remove('btn-outline-light');
                        this.classList.add('btn-danger');
                    }

                    // 1 saniye sonra renkleri sıfırla
                    setTimeout(() => {
                        this.classList.remove('btn-success', 'btn-danger');
                        this.classList.add('btn-outline-light');
                    }, 1500);

                } else {
                    alert('Hata: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                shootBtns.forEach(b => b.disabled = false);
                this.innerHTML = zone;
                alert('Şut çekilirken bir hata oluştu.');
            });
        });
    });
});
</script>
{% endblock %}
