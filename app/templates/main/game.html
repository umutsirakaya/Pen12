{% extends "base.html" %}

{% block content %}
<style>
    .stadium-bg {
        background: radial-gradient(ellipse at bottom, #1a2a1a 0%, #050505 100%);
        min-height: 80vh;
        border-radius: 15px;
        position: relative;
        overflow: hidden;
        padding-top: 20px;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        perspective: 1000px;
    }
    .stadium-bg::before {
        content: '🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️ 🏟️ 👤 🗣️';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.15;
        font-size: 2.5rem;
        line-height: 2;
        word-break: break-all;
        pointer-events: none;
        z-index: 0;
        text-align: center;
        overflow: hidden;
    }
    .scoreboard {
        background-color: #0a0a0a;
        border: 4px solid #333;
        color: #ff3333;
        font-family: 'Courier New', Courier, monospace;
        text-shadow: 0 0 10px #ff3333;
        border-radius: 10px;
    }
    .goal-container-custom {
        position: relative;
        background-color: rgba(20, 120, 40, 0.9);
        border: 20px solid #fff;
        border-bottom: 2px solid #fff;
        border-radius: 15px 15px 0 0;
        /* Net pattern */
        background-image: 
            linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)), 
            linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2));
        background-size: 30px 30px;
        background-position: 0 0, 15px 15px;
        box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
        transform: translateZ(-200px) scale(0.9);
        z-index: 1;
        transform-style: preserve-3d;
    }
    .goalkeeper {
        position: absolute;
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 5rem;
        z-index: 2;
        pointer-events: none;
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.7));
    }
    .goal-grid {
        position: relative;
        z-index: 1; /* In front of goalkeeper */
    }
    .shooter {
        font-size: 8rem;
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6));
        z-index: 10;
        pointer-events: none;
    }
    .shot-taken {
        opacity: 0.7;
        pointer-events: none !important;
    }
    .neon-title {
        color: #fff;
        text-shadow: 0 0 10px #fff, 0 0 20px #0fa, 0 0 30px #0fa;
    }
</style>
<div class="container py-5 stadium-bg">


    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-4 neon-title">Pen12: Hedefini Seç!</h2>
            <div class="d-flex justify-content-between align-items-center mb-4 px-4 py-3 scoreboard shadow-lg">
                <h4 class="m-0 fw-bold">SKOR: <span id="current-score" class="text-warning fs-3">{{ game.total_score
                        }}</span></h4>
                <p class="m-0 text-success fw-bold" style="text-shadow: 0 0 5px #28a745;">BUGÜNKÜ OYUN</p>
            </div>

            <div id="notification-area" class="alert d-none fw-bold" role="alert"></div>

            <div class="goal-container-custom p-3 shadow-lg">
                <div class="goalkeeper">🧍‍♂️🧤</div>
                <div class="goal-grid d-grid gap-2"
                    style="grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 100px);">
                    {% for zone in range(1, 13) %}
                    <button type="button" class="btn btn-outline-light w-100 h-100 fs-1 fw-bold shoot-btn"
                        style="background-color: rgba(255,255,255,0.15); transition: all 0.2s;" data-zone="{{ zone }}">
                        {{ zone }}
                    </button>
                    {% endfor %}
                </div>
            </div>

            <div class="shooter">🏃‍♂️⚽</div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const shootBtns = document.querySelectorAll('.shoot-btn');
        const scoreElement = document.getElementById('current-score');
        const notificationArea = document.getElementById('notification-area');

        shootBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                const zone = this.getAttribute('data-zone');

                // Butonları geçici olarak devre dışı bırak
                shootBtns.forEach(b => b.disabled = true);
                this.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';

                fetch("{{ url_for('main.shoot') }}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ zone: zone })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            scoreElement.innerText = data.new_score;
                            
                            // Tıklanan butonu kalıcı olarak işaretle
                            this.setAttribute('data-shot', 'true');
                            this.classList.add('shot-taken');
                            this.classList.remove('btn-outline-light');

                            notificationArea.classList.remove('d-none', 'alert-success', 'alert-danger');
                            if (data.is_goal) {
                                notificationArea.classList.add('alert-success');
                                notificationArea.innerText = `GOOOLLL! Bölge ${data.zone} tam isabet!`;
                                this.classList.add('btn-success');
                                this.style.backgroundColor = "rgba(25, 135, 84, 0.9)"; // Yeşil
                                this.innerHTML = '⚽';
                            } else {
                                notificationArea.classList.add('alert-danger');
                                notificationArea.innerText = `KAÇTI! Puanın düştü. Bölge ${data.zone}.`;
                                this.classList.add('btn-danger');
                                this.style.backgroundColor = "rgba(220, 53, 69, 0.9)"; // Kırmızı
                                this.innerHTML = '❌';
                            }

                            // Diğer (şut atılmamış) butonları tekrar aktif et
                            shootBtns.forEach(b => {
                                if (b.getAttribute('data-shot') !== 'true') {
                                    b.disabled = false;
                                }
                            });

                        } else {
                            alert('Hata: ' + data.message);
                            this.innerHTML = zone;
                            shootBtns.forEach(b => {
                                if (b.getAttribute('data-shot') !== 'true') {
                                    b.disabled = false;
                                }
                            });
                        }
                    })
                    .catch(error => {
                        this.innerHTML = zone;
                        shootBtns.forEach(b => {
                            if (b.getAttribute('data-shot') !== 'true') {
                                b.disabled = false;
                            }
                        });
                    });
            });
        });
    });
</script>
{% endblock %}
